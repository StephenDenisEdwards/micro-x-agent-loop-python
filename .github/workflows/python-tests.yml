name: Python Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: ADR-024 — no char-truncation defaults outside turn_engine.py
        run: |
          # ADR-024 requires that char-cap / summarisation policy lives only
          # in the agent's ToolResultOverrides config (applied in
          # src/micro_x_agent_loop/turn_engine.py). MCP servers, codegen
          # templates, and per-task tool wrappers MUST NOT ship their own
          # `DEFAULT_MAX_CHARS` or apply `maxChars ?? <default>` fallbacks.
          # See documentation/docs/architecture/decisions/ADR-024-single-layer-tool-result-truncation.md
          set -e
          patterns='(DEFAULT_MAX_CHARS|maxChars[[:space:]]*\?\?|maxChars[[:space:]]*\|\|)'
          hits=$(grep -rEn "$patterns" \
            --include='*.ts' --include='*.js' --include='*.py' \
            mcp_servers codegen-templates tools src \
            2>/dev/null \
            | grep -v 'src/micro_x_agent_loop/turn_engine.py' \
            || true)
          if [ -n "$hits" ]; then
            echo "ADR-024 violation: forbidden truncation-default pattern found outside turn_engine.py:"
            echo "$hits"
            exit 1
          fi

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Mypy (critical architecture modules)
        run: |
          mypy --config-file mypy.ini \
            src/micro_x_agent_loop/agent.py \
            src/micro_x_agent_loop/voice_runtime.py \
            src/micro_x_agent_loop/turn_engine.py \
            src/micro_x_agent_loop/mcp \
            src/micro_x_agent_loop/providers

  test:
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run unit tests
        run: python -m unittest discover -s tests

  coverage:
    # Coverage gate runs once on Python 3.11 to keep CI fast. The
    # threshold is set at 75% — slightly below the current measured
    # value (76%) to give natural variance some room while still
    # catching meaningful regressions. Raise the floor when coverage
    # climbs further; never lower it.
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Pytest with coverage (fail under 75%)
        run: pytest tests/ --cov=micro_x_agent_loop --cov-report=term --cov-fail-under=75 -q
